services:
  bridge:
    build: .
    image: maxtotelega
    container_name: maxtotelega
    env_file: .env
    environment:
      # Внутри контейнера данные (реестр, сессии, бэкапы) всегда в /app/data.
      WORK_DIR: /app/data
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    # Вход в MAX идёт через Telegram-чат — интерактивная консоль не нужна.
