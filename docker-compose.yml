services:
  bridge:
    build: .
    image: maxtotelega
    container_name: maxtotelega
    env_file: .env
    environment:
      # Внутри контейнера данные всегда в /app/data.
      WORK_DIR: /app/data
      MAPPING_DB: /app/data/mapping.db
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    # Нужно для интерактивного ввода SMS-кода на первом запуске.
    stdin_open: true
    tty: true
